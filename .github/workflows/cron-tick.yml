name: Cron tick

# External scheduler for time-based jobs (no-show marking, reminders, aging).
# Chosen over Vercel Cron so the free Vercel tier suffices (Hobby cron is
# daily-only). Runs every 5 minutes; GitHub's shortest schedule granularity.
# Requires two repo secrets:
#   APP_CRON_URL    e.g. https://your-deployment.vercel.app/api/cron/tick
#   CRON_SECRET     the same value as the app's CRON_SECRET env var
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the cron endpoint
        run: |
          curl -fsS -X POST "$APP_CRON_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 60
        env:
          APP_CRON_URL: ${{ secrets.APP_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
